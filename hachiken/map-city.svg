<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 600" font-family="'Noto Sans JP',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FBF8F2"/><stop offset="1" stop-color="#F2ECDF"/></linearGradient>
  </defs>
  <rect width="1120" height="600" fill="url(#bg)"/>

  <!-- 市街地の輪郭（イメージ） -->
  <rect x="120" y="80" width="900" height="440" rx="60" fill="#FFFFFF" stroke="#E9E3D6" stroke-width="2"/>

  <!-- 方位 -->
  <g transform="translate(1050,128)"><circle r="20" fill="#fff" stroke="#E9E3D6"/><path d="M0,-13 L5,5 L0,1 L-5,5 Z" fill="#22305C"/><text x="0" y="-24" text-anchor="middle" font-size="11" fill="#6A6E76" font-weight="700">N</text></g>

  <!-- 環状通（リング・イメージ） -->
  <rect x="250" y="170" width="560" height="300" rx="120" fill="none" stroke="#D8CDB2" stroke-width="10" stroke-dasharray="2 12" stroke-linecap="round"/>
  <text x="250" y="330" transform="rotate(-90 250 330)" text-anchor="middle" font-size="12" fill="#B0883E" font-weight="700" letter-spacing="1">環 状 通</text>

  <!-- 地下鉄（淡色） -->
  <polyline points="800,120 762,235 745,350 728,475" fill="none" stroke="#9FB0C8" stroke-width="5"/>
  <text x="812" y="120" font-size="11" fill="#8C9098">地下鉄南北線</text>
  <polyline points="300,360 745,350 1000,362" fill="none" stroke="#C9B27E" stroke-width="5"/>
  <text x="930" y="384" font-size="11" fill="#8C9098">地下鉄東西線</text>

  <!-- JR函館本線 -->
  <polyline points="232,388 590,372 742,380" fill="none" stroke="#6A6E76" stroke-width="5"/>
  <text x="430" y="408" font-size="12" fill="#6A6E76" font-weight="600">JR函館本線</text>

  <!-- JR学園都市線（本物件の沿線・強調） -->
  <polyline points="590,372 410,300 320,256 210,176" fill="none" stroke="#B0883E" stroke-width="6"/>
  <text x="430" y="278" transform="rotate(-26 430 278)" font-size="12.5" fill="#8C7A4E" font-weight="700">JR学園都市線</text>

  <!-- 駅・拠点マーカー -->
  <!-- 都心 -->
  <g transform="translate(742,372)">
    <circle r="12" fill="#22305C"/><circle r="5" fill="#fff"/>
    <text x="0" y="34" text-anchor="middle" font-size="14" fill="#22305C" font-weight="800">札幌都心</text>
    <text x="0" y="52" text-anchor="middle" font-size="11" fill="#8C9098">札幌駅・大通</text>
  </g>
  <!-- 桑園 -->
  <g transform="translate(590,372)"><circle r="5" fill="#6A6E76"/><text x="0" y="-12" text-anchor="middle" font-size="11" fill="#6A6E76">桑園</text></g>
  <!-- 琴似 -->
  <g transform="translate(300,360)"><circle r="6" fill="#6A6E76"/><text x="-12" y="20" text-anchor="end" font-size="11.5" fill="#6A6E76" font-weight="600">琴似</text></g>
  <!-- 北24条 -->
  <g transform="translate(762,235)"><circle r="5" fill="#9FB0C8"/><text x="12" y="4" font-size="11" fill="#8C9098">北24条</text></g>
  <!-- 本物件（八軒） -->
  <g transform="translate(320,256)">
    <path d="M0,0 L0,-46 L26,-37 L0,-28" fill="#B0883E"/><line x1="0" y1="0" x2="0" y2="-46" stroke="#B0883E" stroke-width="2.5"/>
    <circle r="9" fill="#B0883E" stroke="#fff" stroke-width="2"/>
    <text x="-14" y="22" text-anchor="end" font-size="14" fill="#22305C" font-weight="900">本物件</text>
    <text x="-14" y="40" text-anchor="end" font-size="11.5" fill="#43474E">八軒6条東5丁目</text>
  </g>
  <!-- JR八軒駅（本物件近接） -->
  <g transform="translate(372,300)"><circle r="6" fill="#fff" stroke="#B0883E" stroke-width="3"/><text x="12" y="4" font-size="11.5" fill="#8C7A4E" font-weight="700">JR「八軒」駅</text></g>

  <!-- 方面の矢印 -->
  <text x="150" y="150" font-size="12" fill="#6A6E76" font-weight="700">↖ 小樽・手稲方面</text>
  <text x="170" y="110" font-size="12" fill="#6A6E76" font-weight="700">↑ あいの里・当別方面</text>
  <text x="980" y="470" text-anchor="end" font-size="12" fill="#6A6E76" font-weight="700">新千歳空港方面 ↘</text>

  <!-- アクセス注記 -->
  <g transform="translate(150,492)">
    <rect x="0" y="0" width="470" height="70" rx="8" fill="#fff" stroke="#E9E3D6"/>
    <text x="18" y="28" font-size="13" fill="#22305C" font-weight="700">都心アクセス</text>
    <text x="18" y="50" font-size="12" fill="#43474E">JR「八軒」駅 → 札幌駅 約10分（学園都市線・直通）／環状通で都心へ車。</text>
  </g>

  <text x="640" y="556" font-size="11" fill="#AEB1B7">※ 札幌市内の位置関係を示す広域イメージ図です。路線・距離・方位・形状は正確ではありません。</text>
</svg>
