<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 580" font-family="'Noto Sans JP',sans-serif">
  <defs>
    <linearGradient id="sky2" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FBF8F2"/><stop offset="1" stop-color="#F2ECDF"/></linearGradient>
    <pattern id="rail2" width="14" height="10" patternUnits="userSpaceOnUse"><rect width="14" height="10" fill="none"/><rect x="6" y="0" width="2" height="10" fill="#6A6E76"/></pattern>
  </defs>
  <rect width="1120" height="580" fill="url(#sky2)"/>

  <!-- 方位 -->
  <g transform="translate(1058,52)"><circle r="20" fill="#fff" stroke="#E9E3D6"/><path d="M0,-13 L5,5 L0,1 L-5,5 Z" fill="#22305C"/><text x="0" y="-24" text-anchor="middle" font-size="11" fill="#6A6E76" font-weight="700">N</text></g>

  <!-- 環状通（縦の主要道路） -->
  <rect x="498" y="0" width="104" height="580" fill="#E4DCC9"/>
  <line x1="550" y1="0" x2="550" y2="580" stroke="#FBF8F2" stroke-width="3" stroke-dasharray="16 14"/>
  <text x="550" y="232" transform="rotate(-90 550 232)" text-anchor="middle" font-size="14" fill="#8C7A4E" font-weight="700" letter-spacing="1">環状通（道道 下手稲札幌線）</text>
  <text x="468" y="28" text-anchor="end" font-size="13" fill="#6A6E76" font-weight="700">↑ 北24条・札幌都心方面</text>
  <text x="632" y="560" font-size="13" fill="#6A6E76" font-weight="700">発寒・宮の沢方面 ↓</text>

  <!-- JR学園都市線（高架）左上 -->
  <rect x="40" y="118" width="430" height="12" fill="url(#rail2)" stroke="#AEB1B7" stroke-width="1"/>
  <text x="40" y="104" font-size="12.5" fill="#6A6E76" font-weight="700">JR学園都市線（札沼線・高架）</text>
  <g transform="translate(250,124)">
    <circle r="9" fill="#fff" stroke="#22305C" stroke-width="3"/>
    <text x="0" y="-18" text-anchor="middle" font-size="13.5" fill="#22305C" font-weight="800">JR「八軒」駅</text>
  </g>
  <text x="250" y="158" text-anchor="middle" font-size="11.5" fill="#8C9098">6条東2丁目／本物件まで徒歩約8分</text>
  <text x="44" y="180" font-size="11" fill="#8C9098">← 琴似・桑園・札幌方面</text>
  <text x="464" y="180" text-anchor="end" font-size="11" fill="#8C9098">あいの里・当別方面 →</text>

  <!-- 本物件（環状通の東側に接道） -->
  <g transform="translate(620,300)">
    <rect x="0" y="0" width="186" height="96" rx="7" fill="rgba(176,136,62,0.16)" stroke="#B0883E" stroke-width="3"/>
    <text x="93" y="32" text-anchor="middle" font-size="16" fill="#22305C" font-weight="900">本物件</text>
    <text x="93" y="56" text-anchor="middle" font-size="12" fill="#43474E">八軒6条東5丁目</text>
    <text x="93" y="78" text-anchor="middle" font-size="12" fill="#43474E">約535坪（4筆）・環状通に接道</text>
    <!-- フラッグ -->
    <line x1="10" y1="0" x2="10" y2="-40" stroke="#B0883E" stroke-width="2.5"/>
    <path d="M10,-40 L10,-72 L30,-64 L10,-56" fill="#B0883E"/>
    <!-- 接道マーク -->
    <path d="M0,48 L-22,40 L-22,56 Z" fill="#B0883E"/>
  </g>

  <!-- 施設ピン（右側：医療・商業・バス停） -->
  <g transform="translate(650,96)"><circle r="7" fill="#C0364A"/><text x="13" y="5" font-size="12" fill="#43474E" font-weight="600">北海道脳神経外科記念病院</text></g>
  <g transform="translate(650,180)"><circle r="7" fill="#C0364A"/><text x="13" y="5" font-size="12" fill="#43474E" font-weight="600">クリニック・歯科</text></g>
  <g transform="translate(828,318)"><circle r="7" fill="#6A6E76"/><text x="13" y="5" font-size="12" fill="#43474E" font-weight="600">バス停「八軒6条東5丁目」（前面）</text></g>
  <g transform="translate(650,448)"><circle r="7" fill="#B0883E"/><text x="13" y="5" font-size="12" fill="#43474E" font-weight="600">スーパー・ドラッグ・コンビニ</text></g>
  <g transform="translate(650,498)"><circle r="7" fill="#B0883E"/><text x="13" y="5" font-size="12" fill="#43474E" font-weight="600">飲食・ロードサイド店舗</text></g>

  <!-- 施設ピン（左側：公共・学校・公園） -->
  <g transform="translate(90,248)"><circle r="7" fill="#22305C"/><text x="13" y="5" font-size="12" fill="#43474E" font-weight="600">八軒中央まちづくりセンター</text></g>
  <g transform="translate(90,398)"><circle r="7" fill="#22305C"/><text x="13" y="5" font-size="12" fill="#43474E" font-weight="600">八軒小学校・児童会館</text></g>
  <g transform="translate(90,448)"><circle r="7" fill="#22305C"/><text x="13" y="5" font-size="12" fill="#43474E" font-weight="600">郵便局・金融</text></g>
  <g transform="translate(90,512)"><circle r="7" fill="#3C7A50"/><text x="13" y="5" font-size="12" fill="#43474E" font-weight="600">農試公園・八軒公園 ほか</text></g>

  <!-- 凡例 -->
  <g transform="translate(842,452)">
    <rect x="0" y="0" width="262" height="116" rx="8" fill="#fff" stroke="#E9E3D6"/>
    <text x="16" y="24" font-size="12" fill="#6A6E76" font-weight="700">凡例</text>
    <g transform="translate(16,42)"><circle r="6" fill="#22305C"/><text x="14" y="4" font-size="11.5" fill="#43474E">JR駅・公共施設</text></g>
    <g transform="translate(16,64)"><circle r="6" fill="#C0364A"/><text x="14" y="4" font-size="11.5" fill="#43474E">医療機関</text></g>
    <g transform="translate(16,86)"><circle r="6" fill="#B0883E"/><text x="14" y="4" font-size="11.5" fill="#43474E">商業・生活施設</text></g>
    <g transform="translate(16,108)"><circle r="6" fill="#3C7A50"/><text x="14" y="4" font-size="11.5" fill="#43474E">公園・緑地</text></g>
    <g transform="translate(150,42)"><rect x="-6" y="-6" width="16" height="12" fill="rgba(176,136,62,0.16)" stroke="#B0883E" stroke-width="2"/><text x="16" y="4" font-size="11.5" fill="#43474E">本物件</text></g>
    <g transform="translate(150,64)"><rect x="-6" y="-3" width="16" height="6" fill="#E4DCC9"/><text x="16" y="4" font-size="11.5" fill="#43474E">主要道路</text></g>
    <g transform="translate(150,86)"><rect x="-6" y="-3" width="16" height="6" fill="url(#rail2)"/><text x="16" y="4" font-size="11.5" fill="#43474E">JR線</text></g>
  </g>

  <text x="24" y="566" font-size="11" fill="#AEB1B7">※ 位置関係を示すイメージ図です。距離・縮尺・方位は正確ではありません。</text>
</svg>
